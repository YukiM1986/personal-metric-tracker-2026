<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修行ペット - 設定</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            text-align: center;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        h3 {
            font-size: 1rem;
            color: #999;
            margin-top: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            text-align: left;
        }

        .config-card {
            background: #fff;
            border: 1px solid #eee;
            margin: 10px 0;
            padding: 15px;
            border-radius: 20px;
            text-align: left;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-edit {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-edit:active {
            background: #bbdefb;
        }

        .btn-reset {
            background: #ffebee;
            color: #d32f2f;
            margin-top: 10px;
            width: 100%;
        }

        .all-reset {
            background: #d32f2f;
            color: white;
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            border-radius: 15px;
            font-size: 1rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #007aff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>⚙️ 設定・管理</h2>

        <div class="config-card">
            <div class="card-header">🏷️ 修行ボタンの名前</div>
            <div class="btn-grid">
                <button class="btn-edit" onclick="editBtnName('btnP')">💪名</button>
                <button class="btn-edit" onclick="editBtnName('btnI')">🧠名</button>
                <button class="btn-edit" onclick="editBtnName('btnH')">💖名</button>
            </div>
            <p id="current-btns"
                style="font-size: 0.7rem; color: #999; margin-top: 12px; background: #f8f9fa; padding: 8px; border-radius: 8px;">
            </p>
        </div>

        <h3>ユーザー別データ</h3>
        <div id="settings-list">
        </div>

        <button class="all-reset" onclick="resetTarget('all')">全データをリセット</button>

        <a href="index.html" class="back-link">← 修行にもどる</a>
    </div>

    <script>
        // デフォルトのひな形
        const defaultData = {
            u1: { p: 0, i: 0, h: 0, total: 0, name: "おねえちゃん" },
            u2: { p: 0, i: 0, h: 0, total: 0, name: "おとうとくん" },
            u3: { p: 0, i: 0, h: 0, total: 0, name: "パパ・ママ" },
            config: {
                btnP: "ちから",
                btnI: "かしこさ",
                btnH: "やさしさ"
            }
        };

        // データの読み込みと初期化
        let allData;
        function loadData() {
            const saved = localStorage.getItem('familyShugyoData');
            if (saved) {
                allData = JSON.parse(saved);
                // 足りない項目（新しく追加したconfigなど）を補完
                if (!allData.config) allData.config = defaultData.config;
                if (!allData.u1) allData = defaultData;
            } else {
                allData = defaultData;
            }
        }

        function renderSettings() {
            // ボタン名のプレビュー表示
            const cfg = allData.config;
            document.getElementById('current-btns').innerText =
                `現在の設定：\n💪${cfg.btnP} / 🧠${cfg.btnI} / 💖${cfg.btnH}`;

            // ユーザーリストの生成
            const listContainer = document.getElementById('settings-list');
            listContainer.innerHTML = '';

            ['u1', 'u2', 'u3'].forEach(id => {
                const user = allData[id];
                const card = document.createElement('div');
                card.className = 'config-card';
                card.innerHTML = `
                <div class="user-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:bold; font-size:1.1rem;">${user.name}</span>
                    <button class="btn-edit" onclick="editUserName('${id}')">名前変更</button>
                </div>
                <div style="font-size:0.8rem; color:#666; margin-top:5px;">
                    合計：${user.total}pt (💪${user.p} 🧠${user.i} 💖${user.h})
                </div>
                <button class="btn-reset" onclick="resetTarget('${id}')">この子のデータをリセット</button>
            `;
                listContainer.appendChild(card);
            });
        }

        function editBtnName(key) {
            const current = allData.config[key];
            const newName = prompt("新しい修行の名前に変えるよ：", current);
            if (newName && newName.trim() !== "") {
                allData.config[key] = newName.trim();
                saveAndRefresh();
            }
        }

        function editUserName(id) {
            const newName = prompt("新しい名前に変えるよ：", allData[id].name);
            if (newName && newName.trim() !== "") {
                allData[id].name = newName.trim();
                saveAndRefresh();
            }
        }

        function resetTarget(target) {
            if (!confirm("本当に消してもいいですか？（名前や修行項目も初期化されます）")) return;

            if (target === 'all') {
                // 完全リセット：デフォルトデータで上書きする
                allData = JSON.parse(JSON.stringify(defaultData));
            } else {
                // 特定のユーザーのみリセット
                const currentName = allData[target].name;
                allData[target] = JSON.parse(JSON.stringify(defaultData[target]));
                allData[target].name = currentName; // ユーザー名だけは残す場合はこの一行を入れる
            }

            saveAndRefresh();
            alert("リセットしました！");
        }

        function saveAndRefresh() {
            localStorage.setItem('familyShugyoData', JSON.stringify(allData));
            renderSettings();
        }

        // 実行
        loadData();
        renderSettings();
    </script>

</body>

</html>
