<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修行ペット - 設定</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 400px; margin: auto; background: white; border-radius: 30px; padding: 30px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        h2 { color: #666; font-size: 1.2rem; margin-bottom: 20px; }
        h3 { font-size: 1rem; color: #999; margin-top: 25px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .config-card { background: #fff; border: 1px solid #eee; margin: 10px 0; padding: 15px; border-radius: 20px; text-align: left; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        
        button { border: none; border-radius: 10px; padding: 8px 15px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.2s; }
        .btn-edit { background: #e3f2fd; color: #1976d2; }
        .btn-edit:active { background: #bbdefb; }
        .btn-reset { background: #ffebee; color: #d32f2f; margin-top: 10px; }
        
        .all-reset { background: #d32f2f; color: white; width: 100%; padding: 15px; margin-top: 30px; border-radius: 15px; font-size: 1rem; }
        .back-link { display: inline-block; margin-top: 25px; color: #007aff; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ 設定・管理</h2>

    <div class="config-card">
        <div class="card-header">🏷️ 修行ボタンの名前</div>
        <div class="btn-grid">
            <button class="btn-edit" onclick="editBtnName('btnP')">💪名</button>
            <button class="btn-edit" onclick="editBtnName('btnI')">🧠名</button>
            <button class="btn-edit" onclick="editBtnName('btnH')">💖名</button>
        </div>
        <p id="current-btns" style="font-size: 0.7rem; color: #bbb; margin-top: 8px;"></p>
    </div>

    <h3>ユーザー別データ</h3>
    <div id="settings-list"></div>

    <button class="all-reset" onclick="resetTarget('all')">全データをリセット</button>
    
    <a href="index.html" class="back-link">← 修行にもどる</a>
</div>

<script>
    const defaultData = {
        u1: { p: 0, i: 0, h: 0, total: 0, name: "おねえちゃん" },
        u2: { p: 0, i: 0, h: 0, total: 0, name: "おとうとくん" },
        u3: { p: 0, i: 0, h: 0, total: 0, name: "パパ・ママ" },
        config: {
            btnP: "空手・ダンス",
            btnI: "英語・学習",
            btnH: "お手伝い"
        }
    };

    let allData = JSON.parse(localStorage.getItem('familyShugyoData')) || defaultData;
    if (!allData.config) allData.config = defaultData.config; // 旧データ救済

    function renderSettings() {
        // ボタン名プレビュー
        document.getElementById('current-btns').innerText = 
            `現在の設定: ${allData.config.btnP} / ${allData.config.btnI} / ${allData.config.btnH}`;

        // ユーザーリスト表示
        const list = document.getElementById('settings-list');
        list.innerHTML = '';
        ['u1', 'u2', 'u3'].forEach(id => {
            const user = allData[id];
            const div = document.createElement('div');
            div.className = 'config-card';
            div.innerHTML = `
                <div class="card-header">
                    <span>${user.name}</span>
                    <button class="btn-edit" onclick="editUserName('${id}')">名前変更</button>
                </div>
                <div style="font-size:0.8rem; color:#666;">
                    合計: ${user.total}pt (💪${user.p} 🧠${user.i} 💖${user.h})
                </div>
                <button class="btn-reset" onclick="resetTarget('${id}')">この子のリセット</button>
            `;
            list.appendChild(div);
        });
    }

    function editBtnName(key) {
        const current = allData.config[key];
        const newName = prompt("新しい修行の名前に変えるよ：", current);
        if (newName && newName.trim() !== "") {
            allData.config[key] = newName.trim();
            saveAndRefresh();
        }
    }

    function editUserName(id) {
        const newName = prompt("新しい名前に変えるよ：", allData[id].name);
        if (newName && newName.trim() !== "") {
            allData[id].name = newName.trim();
            saveAndRefresh();
        }
    }

    function resetTarget(target) {
        if (!confirm("データをリセットします。本当によろしいですか？")) return;
        if (target === 'all') {
            const u1n = allData.u1.name, u2n = allData.u2.name, u3n = allData.u3.name;
            const cfg = allData.config;
            allData = JSON.parse(JSON.stringify(defaultData));
            allData.u1.name = u1n; allData.u2.name = u2n; allData.u3.name = u3n;
            allData.config = cfg;
        } else {
            const currentName = allData[target].name;
            allData[target] = { p: 0, i: 0, h: 0, total: 0, name: currentName };
        }
        saveAndRefresh();
        alert("リセットしました");
    }

    function saveAndRefresh() {
        localStorage.setItem('familyShugyoData', JSON.stringify(allData));
        renderSettings();
    }

    renderSettings();
</script>
</body>
</html>
