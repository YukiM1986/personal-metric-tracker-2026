<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修行ペット - ユーザー選択</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 400px; margin: auto; background: white; border-radius: 30px; padding: 30px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; color: #444; margin-bottom: 30px; }
        .user-btn { background: #fff; color: #444; border: 2px solid #eee; margin: 15px 0; padding: 25px; border-radius: 20px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; width: 100%; box-sizing: border-box; }
        .user-btn:active { background: #f1f3f5; transform: scale(0.98); }
        .nav-link { display: block; margin-top: 20px; color: #999; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>だれが あそぶ？</h1>
        <div id="user-selection">
            <button class="user-btn" onclick="selectUser('u1')"><span id="u1-name-label">ユーザー1</span></button>
            <button class="user-btn" onclick="selectUser('u2')"><span id="u2-name-label">ユーザー2</span></button>
            <button class="user-btn" onclick="selectUser('u3')"><span id="u3-name-label">ユーザー3</span></button>
        </div>
        <a href="settings.html" class="nav-link">せってい画面へ</a>
    </div>

    <script>
        let allData = JSON.parse(localStorage.getItem('familyShugyoData'));

        function init() {
            if (!allData) return;
            // 設定された名前に書き換え
            document.getElementById('u1-name-label').innerText = allData.u1.name;
            document.getElementById('u2-name-label').innerText = allData.u2.name;
            document.getElementById('u3-name-label').innerText = allData.u3.name;
        }

        function selectUser(userId) {
            // 選択したユーザーを保存してメイン画面へ
            console.log("shugyoPet_currentUser",userId);
            localStorage.setItem('shugyoPet_currentUser', userId);
            
            window.location.href = 'main.html';
        }

        init();
    </script>
</body>
</html>
