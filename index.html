<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修行ペット - 家族版</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 400px; margin: auto; background: white; border-radius: 30px; padding: 30px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        
        /* ユーザー選択画面 */
        #user-selection { display: block; }
        #main-app { display: none; }

        .user-btn { 
            background: #fff; color: #444; border: 2px solid #eee; margin: 15px 0; padding: 20px; 
            border-radius: 20px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .user-btn:active { background: #f1f3f5; transform: scale(0.98); }
        .user-icon { font-size: 2rem; margin-right: 15px; }

        /* メイン画面 */
        .pet-display { font-size: 80px; margin: 10px 0; height: 110px; display: flex; align-items: center; justify-content: center; }
        .points { font-size: 3.5rem; font-weight: 800; color: #444; margin: 0; }
        
        button.action-btn { 
            width: 100%; font-size: 1.1rem; padding: 18px; margin: 10px 0; 
            border-radius: 18px; border: none; color: white; font-weight: bold; 
            cursor: pointer; transition: all 0.2s; box-shadow: 0 6px rgba(0,0,0,0.1);
        }
        .btn-p { background: #ff8a80; box-shadow: 0 6px #e57373; }
        .btn-i { background: #82b1ff; box-shadow: 0 6px #64b5f6; }
        .btn-h { background: #b9f6ca; color: #558b2f; box-shadow: 0 6px #81c784; }
        button:active { transform: translateY(4px); box-shadow: 0 2px rgba(0,0,0,0.2); }

        .nav-btn { background: none; border: none; color: #999; text-decoration: underline; margin-top: 20px; cursor: pointer; }
        #current-user-name { font-weight: bold; color: #666; margin-bottom: 10px; display: block; }
        #status { margin-bottom: 20px; font-size: 0.8rem; color: #bbb; display: flex; justify-content: space-around; }
        .status-item { background: #f1f3f5; padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="user-selection">
        <h2>だれの修行？</h2>
        <div class="user-btn" onclick="selectUser('daughter')"><span class="user-icon">👧</span> おねえちゃん</div>
        <div class="user-btn" onclick="selectUser('son')"><span class="user-icon">👦</span> おとうとくん</div>
        <div class="user-btn" onclick="selectUser('parent')"><span class="user-icon">🧔</span> パパ・ママ</div>
    </div>

    <div id="main-app">
        <span id="current-user-name">ユーザー名</span>
        <div id="pet-stage" class="pet-display">🥚</div>
        <div id="total-display" class="points">0</div>
        
        <div id="status">
            <span class="status-item">P: <span id="p-pts">0</span></span>
            <span class="status-item">I: <span id="i-pts">0</span></span>
            <span class="status-item">H: <span id="h-pts">0</span></span>
        </div>

        <button class="action-btn btn-p" onclick="addPoint('p', 15)">空手・ダンス (+15)</button>
        <button class="action-btn btn-i" onclick="addPoint('i', 10)">英語・学習 (+10)</button>
        <button class="action-btn btn-h" onclick="addPoint('h', 5)">お手伝い (+5)</button>

        <button class="nav-btn" onclick="backToMenu()">ユーザーをかえる</button>
    </div>
</div>

<script>
    // ユーザーごとのデータを管理する構造
    let allData = JSON.parse(localStorage.getItem('familyShugyoData')) || {
        daughter: { p: 0, i: 0, h: 0, total: 0, name: "おねえちゃん" },
        son: { p: 0, i: 0, h: 0, total: 0, name: "おとうとくん" },
        parent: { p: 0, i: 0, h: 0, total: 0, name: "パパ・ママ" }
    };

    let currentUser = null;

    function selectUser(userKey) {
        currentUser = userKey;
        document.getElementById('user-selection').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('current-user-name').innerText = allData[currentUser].name;
        updateDisplay();
    }

    function backToMenu() {
        document.getElementById('user-selection').style.display = 'block';
        document.getElementById('main-app').style.display = 'none';
    }

    function updateDisplay() {
        const d = allData[currentUser];
        document.getElementById('total-display').innerText = d.total;
        document.getElementById('p-pts').innerText = d.p;
        document.getElementById('i-pts').innerText = d.i;
        document.getElementById('h-pts').innerText = d.h;
        
        const petStage = document.getElementById('pet-stage');
        if (d.total >= 100) { petStage.innerText = "🐥"; }
        else { petStage.innerText = "🥚"; }
    }

    function addPoint(type, pts) {
        allData[currentUser][type] += pts;
        allData[currentUser].total += pts;
        localStorage.setItem('familyShugyoData', JSON.stringify(allData));
        updateDisplay();
        if (window.navigator.vibrate) window.navigator.vibrate(10);
    }
</script>

</body>
</html>
