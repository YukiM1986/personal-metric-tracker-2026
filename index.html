<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修行ペット - 家族版</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 400px; margin: auto; background: white; border-radius: 30px; padding: 30px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        #user-selection, #main-app { display: none; }
        .user-btn { background: #fff; color: #444; border: 2px solid #eee; margin: 15px 0; padding: 25px; border-radius: 20px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .user-btn:active { background: #f1f3f5; transform: scale(0.98); }
        .pet-display { font-size: 80px; margin: 10px 0; height: 110px; display: flex; align-items: center; justify-content: center; }
        .total-label { font-size: 0.85rem; color: #999; font-weight: bold; margin-top: 10px; }
        .points { font-size: 3.5rem; font-weight: 800; color: #444; margin: 0; }
        #status-area { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .status-row { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 12px 15px; border-radius: 15px; }
        .status-label { font-size: 0.85rem; font-weight: bold; width: 90px; text-align: left; }
        .bar-bg { flex-grow: 1; height: 12px; background: #e9ecef; border-radius: 6px; margin: 0 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .p-color { background: #ff8a80; } .i-color { background: #82b1ff; } .h-color { background: #b9f6ca; }
        .pts-num { font-weight: bold; font-size: 0.9rem; width: 40px; text-align: right; color: #666; }
        button.action-btn { width: 100%; font-size: 1.1rem; padding: 18px; margin: 8px 0; border-radius: 18px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 6px rgba(0,0,0,0.1); }
        .btn-p { background: #ff8a80; box-shadow: 0 6px #e57373; } .btn-i { background: #82b1ff; box-shadow: 0 6px #64b5f6; } .btn-h { background: #b9f6ca; color: #558b2f; box-shadow: 0 6px #81c784; }
        button:active { transform: translateY(4px); box-shadow: 0 2px rgba(0,0,0,0.2); }
        .nav-btn { display: inline-block; color: #999; text-decoration: underline; margin-top: 20px; cursor: pointer; font-size: 0.85rem; padding: 10px; background: none; border: none; }
    </style>
</head>
<body>
<div class="container">
    <div id="user-selection" style="display: block;">
        <h2 style="margin-bottom:30px;">だれの修行？</h2>
        <div class="user-btn" onclick="selectUser('u1')"><span>👧 <span id="u1-name-disp"></span></span></div>
        <div class="user-btn" onclick="selectUser('u2')"><span>👦 <span id="u2-name-disp"></span></span></div>
        <div class="user-btn" onclick="selectUser('u3')"><span>🧔 <span id="u3-name-disp"></span></span></div>
        <a href="settings.html" class="nav-btn">⚙️ 設定・管理</a>
    </div>

    <div id="main-app">
        <span id="current-user-name" style="font-weight:bold; color:#666; font-size:1.1rem;">名前</span>
        <div id="pet-stage" class="pet-display">🥚</div>
        <div class="total-label">修行ランク</div>
        <div id="total-display" class="points">0</div>
        
        <div id="status-area">
            <div class="status-row">
                <span class="status-label">💪 ちから</span>
                <div class="bar-bg"><div id="p-bar" class="bar-fill p-color"></div></div>
                <span id="p-pts" class="pts-num">0</span>
            </div>
            <div class="status-row">
                <span class="status-label">🧠 かしこさ</span>
                <div class="bar-bg"><div id="i-bar" class="bar-fill i-color"></div></div>
                <span id="i-pts" class="pts-num">0</span>
            </div>
            <div class="status-row">
                <span class="status-label">💖 やさしさ</span>
                <div class="bar-bg"><div id="h-bar" class="bar-fill h-color"></div></div>
                <span id="h-pts" class="pts-num">0</span>
            </div>
        </div>
        
        <button id="display-btn-p" class="action-btn btn-p" onclick="addPoint('p', 15)"></button>
        <button id="display-btn-i" class="action-btn btn-i" onclick="addPoint('i', 10)"></button>
        <button id="display-btn-h" class="action-btn btn-h" onclick="addPoint('h', 5)"></button>
        <button class="nav-btn" onclick="showMenu()">ユーザーをかえる</button>
    </div>
</div>

<script>
    const defaultData = {
        u1: { p: 0, i: 0, h: 0, total: 0, name: "おねえちゃん" },
        u2: { p: 0, i: 0, h: 0, total: 0, name: "おとうとくん" },
        u3: { p: 0, i: 0, h: 0, total: 0, name: "パパ・ママ" },
        config: { btnP: "空手・ダンス", btnI: "英語・学習", btnH: "お手伝い" }
    };

    let allData = JSON.parse(localStorage.getItem('familyShugyoData')) || defaultData;
    let currentUser = null;

    function showMenu() {
        allData = JSON.parse(localStorage.getItem('familyShugyoData')) || defaultData;
        if (!allData.config) allData.config = defaultData.config;

        document.getElementById('user-selection').style.display = 'block';
        document.getElementById('main-app').style.display = 'none';

        // 表示の更新
        ['u1','u2','u3'].forEach(id => document.getElementById(id + '-name-disp').innerText = allData[id].name);
        document.getElementById('display-btn-p').innerText = `${allData.config.btnP} (+15)`;
        document.getElementById('display-btn-i').innerText = `${allData.config.btnI} (+10)`;
        document.getElementById('display-btn-h').innerText = `${allData.config.btnH} (+5)`;
    }

    function selectUser(userKey) {
        currentUser = userKey;
        document.getElementById('user-selection').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('current-user-name').innerText = allData[currentUser].name;
        updateDisplay();
    }

    function updateDisplay() {
        if (!currentUser) return;
        const d = allData[currentUser];
        document.getElementById('total-display').innerText = d.total;
        document.getElementById('p-pts').innerText = d.p;
        document.getElementById('i-pts').innerText = d.i;
        document.getElementById('h-pts').innerText = d.h;
        document.getElementById('p-bar').style.width = Math.min((d.p / 150) * 100, 100) + "%";
        document.getElementById('i-bar').style.width = Math.min((d.i / 150) * 100, 100) + "%";
        document.getElementById('h-bar').style.width = Math.min((d.h / 150) * 100, 100) + "%";
        document.getElementById('pet-stage').innerText = d.total >= 100 ? "🐥" : "🥚";
    }

    function addPoint(type, pts) {
        if (!currentUser) return;
        allData[currentUser][type] += pts;
        allData[currentUser].total += pts;
        localStorage.setItem('familyShugyoData', JSON.stringify(allData));
        updateDisplay();
        if (window.navigator.vibrate) window.navigator.vibrate(10);
    }

    window.onload = showMenu;
</script>
</body>
</html>
